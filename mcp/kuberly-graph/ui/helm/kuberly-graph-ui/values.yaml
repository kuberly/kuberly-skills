replicaCount: 1

image:
  repository: public.ecr.aws/n3h0s9r7/kuberly-graph-ui
  tag: main
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# URL the nginx reverse-proxy will forward /api/* and /dashboard to. The
# default points at the in-cluster kuberly-platform Service; override per env.
backend:
  url: http://kuberly-platform.monitoring.svc.cluster.local:8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: graph.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# Probes hit the SPA root (always 200) — index.html is statically served.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 2
  periodSeconds: 10
