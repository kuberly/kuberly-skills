# Microsoft APM — https://github.com/microsoft/apm
# Consumers (kuberly-stack and forks) depend on this repo via:
#   - git@github.com:kuberly/kuberly-skills.git#vX.Y.Z   (SSH)
#   - github.com/kuberly/kuberly-skills#vX.Y.Z           (HTTPS)
name: kuberly-skills
version: 0.32.1
description: >-
  Kuberly org agent skills for kuberly-stack and customer forks (Cursor, Claude Code, Codex).
type: hybrid
target: all

dependencies:
  apm: []
  # Self-defined MCP server: ships inside this package, no registry lookup.
  # Consumers don't need a separate `.mcp.json` entry — APM merges this
  # into the runtime's MCP configuration on `apm install`.
  mcp:
    - name: kuberly-platform
      registry: false
      transport: stdio
      command: python3
      args:
        # Repo-relative path so Cursor/VS Code MCP (cwd = workspace) resolve it.
        # Claude Code project `.mcp.json` is merged by sync_claude_config.py with the same layout.
        - apm_modules/kuberly/kuberly-skills/mcp/kuberly-platform/kuberly_platform.py
        - mcp
        - --repo
        - "."
