name: Validate skills

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validate-skills.sh
        run: ./scripts/validate-skills.sh

      - name: Optional — apm audit (if apm installed)
        continue-on-error: true
        run: |
          pip install --quiet apm-cli || true
          if command -v apm >/dev/null 2>&1; then
            apm audit -f markdown -o apm-audit.md || true
            cat apm-audit.md 2>/dev/null || true
          fi
